version: "3.9"
services:
  fang:
    build: .
    container_name: fang
    restart: unless-stopped
    ports:
      - "8443:8443"
    volumes:
      - fang_data:/home/fang/.fang
    environment:
      - FANG_PORT=8443
      - FANG_HOST=0.0.0.0
      - FANG_JWT_SECRET=${FANG_JWT_SECRET:-change-me-in-production}
      - FANG_DB_PATH=/home/fang/.fang/data/fang.db

volumes:
  fang_data:
